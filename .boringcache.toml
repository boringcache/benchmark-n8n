workspace = "boringcache/benchmarks"

# Archive entries that complement turbo-proxy mode for fair warm/rolling
# parity with actions/cache. The action's `cache-tag` input prefixes each
# entry's tag at resolution, so the proxy tag (e.g. n8n-run-r123-a1-turbo)
# also namespaces the archives below it.
#
# Note on pnpm store: the pnpm store contains workspace-back symlinks
# whose targets escape the restore root by design (e.g.
# .pnpm-store/v10/projects/HASH/ -> ../../../upstream). CLI 1.12.55+
# requires opt-in via --allow-external-symlinks, but boringcache/one@v1
# does not yet expose that flag. Until it does, we archive only the
# Turbo task cache; pnpm install re-runs on warm (loses ~30s vs AC).

[entries.local]
tag = "local"
default_path = "upstream/.turbo"

[profiles.benchmark]
entries = ["local"]
